<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Form Explorer + Grapher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .math-font { font-family: 'Times New Roman', Times, serif; font-style: italic; }
        .step-card { transition: all 0.3s ease; border-left-width: 4px; }
        .step-card:hover { transform: translateX(5px); }
        canvas { background-color: #ffffff; border-radius: 1rem; }
        .math-block { background: rgba(0,0,0,0.03); padding: 0.75rem; border-radius: 0.5rem; margin: 0.5rem 0; font-family: 'Courier New', Courier, monospace; line-height: 1.5; }
        .final-eq-box { border: 2px dashed #cbd5e1; padding: 0.75rem; border-radius: 0.5rem; margin-top: 1rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Quadratic Form Explorer</h1>
            <p class="text-slate-600 italic">"The intersection of Algebra and Geometry"</p>
        </header>

        <!-- Examples Section -->
        <div class="mb-8 flex flex-wrap gap-3 justify-center">
            <span class="text-sm font-bold text-slate-400 uppercase tracking-wider w-full text-center mb-2">Preset Examples</span>
            <button onclick="loadExample(1, -6, 8)" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-sm font-medium text-slate-600 hover:bg-blue-50 hover:border-blue-200 transition">Two Roots: x² - 6x + 8</button>
            <button onclick="loadExample(1, 4, 4)" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-sm font-medium text-slate-600 hover:bg-blue-50 hover:border-blue-200 transition">Perfect Square: x² + 4x + 4</button>
            <button onclick="loadExample(-1, 0, 4)" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-sm font-medium text-slate-600 hover:bg-blue-50 hover:border-blue-200 transition">Inverted: -x² + 4</button>
            <button onclick="loadExample(2, 8, 6)" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-sm font-medium text-slate-600 hover:bg-blue-50 hover:border-blue-200 transition">A > 1: 2x² + 8x + 6</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Column: Inputs & Logic -->
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
                    <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        1. Standard Form Coefficients
                    </h2>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">a</label>
                            <input type="number" id="coeff-a" value="1" step="any" class="w-full px-3 py-2 rounded border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">b</label>
                            <input type="number" id="coeff-b" value="-6" step="any" class="w-full px-3 py-2 rounded border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400 block mb-1">c</label>
                            <input type="number" id="coeff-c" value="8" step="any" class="w-full px-3 py-2 rounded border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                        </div>
                    </div>
                    <button onclick="calculate()" class="w-full mt-6 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition shadow-lg">Transform Equation</button>
                </div>

                <div id="results" class="hidden space-y-6">
                    <!-- Final Equations -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl">
                            <h3 class="text-emerald-800 font-bold text-xs uppercase tracking-widest mb-1">Vertex Form Result</h3>
                            <p id="vertex-result" class="text-xl font-serif italic text-emerald-900"></p>
                        </div>
                        <div class="bg-purple-50 border border-purple-100 p-4 rounded-xl">
                            <h3 class="text-purple-800 font-bold text-xs uppercase tracking-widest mb-1">Factored Form Result</h3>
                            <p id="factored-result" class="text-xl font-serif italic text-purple-900"></p>
                        </div>
                    </div>
                    
                    <!-- Detailed Tutorial Steps -->
                    <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
                        <h2 class="text-lg font-bold text-slate-700 mb-6">2. Step-by-Step Conversion Process</h2>
                        <div id="steps-container" class="space-y-8"></div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Visualization -->
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-xl p-6 sticky top-4 border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-slate-700">Geometric Result</h2>
                        <div class="flex gap-4 text-[10px] font-black uppercase">
                            <span class="text-blue-500 bg-blue-50 px-2 py-1 rounded">Vertex</span>
                            <span class="text-purple-500 bg-purple-50 px-2 py-1 rounded">Roots</span>
                            <span class="text-orange-500 bg-orange-50 px-2 py-1 rounded">Y-Int</span>
                        </div>
                    </div>
                    <canvas id="graphCanvas" width="500" height="500" class="w-full border border-slate-50"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        function formatNum(n) {
            return Number.isInteger(n) ? n : parseFloat(n.toFixed(2));
        }

        function getSign(n, start = false) {
            if (start) return n < 0 ? "-" : "";
            return n < 0 ? " - " : " + ";
        }

        function loadExample(a, b, c) {
            document.getElementById('coeff-a').value = a;
            document.getElementById('coeff-b').value = b;
            document.getElementById('coeff-c').value = c;
            calculate();
        }

        function calculate() {
            const a = parseFloat(document.getElementById('coeff-a').value);
            const b = parseFloat(document.getElementById('coeff-b').value);
            const c = parseFloat(document.getElementById('coeff-c').value);

            if (isNaN(a) || isNaN(b) || isNaN(c) || a === 0) return;

            document.getElementById('results').classList.remove('hidden');

            // --- MATH CALCULATIONS ---
            const h = -b / (2 * a);
            const k = a * h * h + b * h + c;
            const discriminant = b * b - 4 * a * c;
            
            const hDispVal = formatNum(-h);
            const kDispVal = formatNum(k);
            const aDisp = a === 1 ? "" : (a === -1 ? "-" : formatNum(a));
            
            // Vertex Form String
            const vertexEq = `${aDisp}(x ${getSign(hDispVal)}${Math.abs(hDispVal)})² ${k !== 0 ? getSign(kDispVal) + Math.abs(kDispVal) : ""}`;
            document.getElementById('vertex-result').textContent = vertexEq;

            // Factored Form String
            let r1 = null, r2 = null;
            let factoredEq = "No Real Roots";
            if (discriminant >= 0) {
                r1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                r2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                const r1D = formatNum(-r1);
                const r2D = formatNum(-r2);
                factoredEq = Math.abs(r1 - r2) < 0.01 
                    ? `${aDisp}(x ${getSign(r1D)}${Math.abs(r1D)})²` 
                    : `${aDisp}(x ${getSign(r1D)}${Math.abs(r1D)})(x ${getSign(r2D)}${Math.abs(r2D)})`;
            }
            document.getElementById('factored-result').textContent = factoredEq;

            // --- TUTORIAL CONTENT GENERATION ---
            let stepsHtml = `
                <!-- Vertex Process -->
                <div class="step-card p-5 bg-blue-50 border-blue-500 rounded-r-xl">
                    <h4 class="font-bold text-blue-800 text-sm mb-3 uppercase tracking-wider">Process: Standard → Vertex Form</h4>
                    <p class="text-slate-700 text-sm mb-3">To find the form <strong>a(x - h)² + k</strong>:</p>
                    <div class="space-y-3">
                        <div class="math-block text-xs">
                            <strong>1. Find h:</strong> h = -b / (2a)<br>
                            h = -(${b}) / (2 * ${a}) = <strong>${formatNum(h)}</strong>
                        </div>
                        <div class="math-block text-xs">
                            <strong>2. Find k:</strong> Plug h back into the equation<br>
                            k = ${a}(${formatNum(h)})² + ${b}(${formatNum(h)}) + ${c} = <strong>${formatNum(k)}</strong>
                        </div>
                    </div>
                    <div class="final-eq-box text-blue-900 bg-white/50 border-blue-200">
                        Vertex Equation:<br><span class="text-xl font-serif italic">${vertexEq}</span>
                    </div>
                </div>

                <!-- Factor Process -->
                <div class="step-card p-5 bg-purple-50 border-purple-500 rounded-r-xl">
                    <h4 class="font-bold text-purple-800 text-sm mb-3 uppercase tracking-wider">Process: Standard → Factored Form</h4>
                    <p class="text-slate-700 text-sm mb-3">To find the form <strong>a(x - r₁)(x - r₂)</strong>:</p>
                    <div class="space-y-3">
                        <div class="math-block text-xs">
                            <strong>1. Calculate Discriminant (D):</strong> D = b² - 4ac<br>
                            D = (${b})² - 4(${a})(${c}) = <strong>${formatNum(discriminant)}</strong>
                        </div>
                        ${discriminant >= 0 ? `
                        <div class="math-block text-xs">
                            <strong>2. Solve for Roots:</strong> x = (-b ± √D) / 2a<br>
                            r₁ = (-(${b}) + √${formatNum(discriminant)}) / (2 * ${a}) = <strong>${formatNum(r1)}</strong><br>
                            r₂ = (-(${b}) - √${formatNum(discriminant)}) / (2 * ${a}) = <strong>${formatNum(r2)}</strong>
                        </div>` : `<div class="p-2 bg-red-100 text-red-700 text-xs rounded">Since D < 0, there are no real factors.</div>`}
                    </div>
                    <div class="final-eq-box text-purple-900 bg-white/50 border-purple-200">
                        Factored Equation:<br><span class="text-xl font-serif italic">${factoredEq}</span>
                    </div>
                </div>

                <!-- Y-Intercept -->
                <div class="step-card p-5 bg-orange-50 border-orange-500 rounded-r-xl">
                    <h4 class="font-bold text-orange-800 text-sm mb-2 uppercase tracking-wider">Intercept Check</h4>
                    <p class="text-slate-700 text-sm">Setting x = 0 gives the point <strong>(0, ${c})</strong>.</p>
                </div>
            `;
            document.getElementById('steps-container').innerHTML = stepsHtml;

            drawGraph(a, b, c, h, k, r1, r2);
        }

        function drawGraph(a, b, c, h, k, r1, r2) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = 30; 

            // Grid lines
            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += scale/2) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Axes
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();

            // Parabola
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let started = false;
            for(let px = -15; px <= 15; px += 0.1) {
                const py = a * px * px + b * px + c;
                const sx = centerX + px * scale;
                const sy = centerY - py * scale;
                if (sy >= -100 && sy <= canvas.height + 100) {
                    if(!started) { ctx.moveTo(sx, sy); started = true; }
                    else ctx.lineTo(sx, sy);
                }
            }
            ctx.stroke();

            function plot(x, y, color, label) {
                const sx = centerX + x * scale;
                const sy = centerY - y * scale;
                if (sy < 0 || sy > canvas.height || sx < 0 || sx > canvas.width) return;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(sx, sy, 7, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#1e293b';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText(`${label} (${formatNum(x)}, ${formatNum(y)})`, sx + 12, sy - 5);
            }

            plot(h, k, '#3b82f6', 'Vertex'); 
            plot(0, c, '#f97316', 'Y-Int');  
            if(r1 !== null) {
                plot(r1, 0, '#a855f7', 'Root');
                if (Math.abs(r1 - r2) > 0.01) plot(r2, 0, '#a855f7', 'Root');
            }
        }

        window.onload = calculate;
    </script>
</body>
</html>
